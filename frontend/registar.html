<!DOCTYPE html>
<html>
<head>
    <title>Registar - VIVADARTE</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 100px; }
        input, button { padding: 10px; margin: 5px; width: 250px; }
        .error { color: red; }
        .success { color: green; }
        a { display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>VIVADARTE</h1>
    <h2>Criar Conta</h2>
    <div id="message"></div>
    <input type="text" id="nome" placeholder="Nome completo"><br>
    <input type="email" id="email" placeholder="Email"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="registar()">Registar</button>
    <a href="/">Voltar ao Login</a>

    <script>
        async function registar() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!nome || !email || !password) {
                document.getElementById('message').innerText = 'Preencha todos os campos';
                return;
            }

            try {
                const response = await fetch('/api/registar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('message').className = 'success';
                    document.getElementById('message').innerText = data.message + ' Faça login!';
                    setTimeout(() => { window.location.href = '/'; }, 2000);
                } else {
                    document.getElementById('message').className = 'error';
                    document.getElementById('message').innerText = data.error;
                }
            } catch (error) {
                document.getElementById('message').innerText = 'Erro ao conectar ao servidor';
            }
        }
    </script>
</body>
</html>
