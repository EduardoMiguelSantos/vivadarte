<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viva D'Arte — Pedido de Acesso</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <h1>Viva D'Arte</h1>
                <p>Pedido de Acesso</p>
            </div>
            <div id="mensagem" style="display:none"></div>
            <form id="formRegistar">
                <div class="campo">
                    <label>Nome completo</label>
                    <input type="text" id="nome" placeholder="O teu nome" required>
                </div>
                <div class="campo">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="email@exemplo.pt" required>
                </div>
                <div class="campo">
                    <label>Telefone</label>
                    <input type="text" id="telefone" placeholder="912345678">
                </div>
                <div class="campo">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="campo">
                    <label>Perfil</label>
                    <select id="perfil" required>
                        <option value="">Seleciona o teu perfil</option>
                        <option value="Professor">Professor</option>
                        <option value="EE">Encarregado de Educação</option>
                        <option value="Contabilidade">Contabilidade</option>
                        <option value="Coordenação">Coordenação</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="btnRegistar">Enviar Pedido</button>
            </form>
            <br>
            <center>
                <a href="/" class="link">Já tens conta? Entrar</a>
            </center>
        </div>
    </div>
    <script src="/js/registar.js"></script>
</body>
</html>
