<!DOCTYPE html>
<html>
<head>
    <title>Aluno - VIVADARTE</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .logout { background: red; color: white; padding: 10px; text-decoration: none; display: inline-block; margin-top: 20px; }
        .user-info { background: #f0f0f0; padding: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Painel do Aluno</h1>
    <div id="userInfo" class="user-info"></div>
    <p>Bem-vindo à área do aluno!</p>
    <a href="/" class="logout">Sair</a>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!user.id_utilizador) {
            window.location.href = '/';
        }
        
        document.getElementById('userInfo').innerHTML = `
            <strong>${user.nome}</strong> (${user.email})
        `;
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/';
        }
    </script>
</body>
</html>
